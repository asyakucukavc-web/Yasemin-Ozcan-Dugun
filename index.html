<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yasemin & Özcan | Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

  /* BASE TEXT */
body{
  font-family:'Inter',sans-serif;
  letter-spacing:0.2px;
  -webkit-font-smoothing:antialiased;
}

/* NAMES (LUXURY SIGNATURE) */
.names, .hero h1, .seal{
  font-family:'Playfair Display',serif;
  font-weight:500;
  letter-spacing:1px;
}

/* BIG ROMANTIC HEADINGS */
h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;
  letter-spacing:0.5px;
}

/* DATE STYLE */
.date{
  font-family:'Inter',sans-serif;
  font-weight:300;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:0.7;
}

/* SMALL TEXT */
p, small{
  font-family:'Inter',sans-serif;
  font-weight:300;
  line-height:1.6;
}
.names{
  font-size:78px;
  line-height:1;
  margin-bottom:10px;
}

  body{
  text-rendering:optimizeLegibility;
}
  
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#fff3f6,#f7f0ea,#fdfaf6);
  overflow-x:hidden;
}

/* FLOWERS */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ENVELOPE */
#overlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f5d4dd,#d8ebf7,#eae2cd);
  z-index:999;
}

.envelope{
  width:340px;
  height:220px;
  position:relative;
  cursor:pointer;
}

.base{
  position:absolute;
  inset:0;
  background:linear-gradient(145deg,#fff,#f1dfe6);
  border-radius:14px;
  box-shadow:0 40px 100px rgba(0,0,0,0.2);
}

.flap{
  position:absolute;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#f3b9cc,#e79ab3);
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s cubic-bezier(.2,.8,.2,1);
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.seal{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:#b85c74;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display',serif;
  transition:.5s;
}

.envelope.open .seal{
  opacity:0;
  transform:translate(-50%,-50%) scale(0.3);
}

/* MAIN */
#main{
  opacity:0;
  transition:1.5s ease;
  position:relative;
  z-index:2;
  text-align:center;
}

#main.show{opacity:1;}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
}

.names{
  font-family:'Playfair Display',serif;
  font-size:76px;
  color:#b85c74;
}

.date{
  margin-top:10px;
  font-size:14px;
  letter-spacing:3px;
  opacity:0.7;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  gap:16px;
  margin-top:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  padding:18px;
  border-radius:14px;
  min-width:90px;
  box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

.num{
  font-size:26px;
  font-weight:500;
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
  max-width:900px;
  margin:0 auto;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  border-radius:30px;
  background:#b85c74;
  color:white;
  text-decoration:none;
  font-size:13px;
  letter-spacing:2px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- ENVELOPE -->
<div id="overlay">
  <div class="envelope" id="env" onclick="openSite()">

    <div class="base"></div>
    <div class="flap"></div>
    <div class="seal">Y&Ö</div>

  </div>
</div>

<!-- MAIN -->
<div id="main">

  <div class="hero">
    <div class="names">Yasemin & Özcan</div>

    <!-- 📅 DATE (RESTORED) -->
    <div class="date">18 AĞUSTOS 2026 • 20:00</div>

    <!-- ⏳ COUNTDOWN -->
    <div class="countdown">
      <div class="box"><div id="d" class="num">--</div>Gün</div>
      <div class="box"><div id="h" class="num">--</div>Saat</div>
      <div class="box"><div id="m" class="num">--</div>Dakika</div>
      <div class="box"><div id="s" class="num">--</div>Saniye</div>
    </div>
  </div>

  <!-- 📍 DETAILS -->
  <div class="section">
    <div class="card">
      <h2>Etkinlik Detayları</h2>
      <p>18 Ağustos 2026 • 20:00</p>
    </div>
  </div>

  <!-- 🗺️ LOCATION -->
  <div class="section">
    <div class="card">
      <h2>Mekan</h2>
      <p>
        Gloria Wedding Hall<br>
        Çekmece Kavşağı, Hatay
      </p>

      <!-- GOOGLE MAPS (RESTORED) -->
      <a class="btn"
         href="https://www.google.com/maps?q=Gloria+Wedding+Hall+Hatay"
         target="_blank">
        Yol Tarifi Al
      </a>
    </div>
  </div>

</div>

<script>

/* OPEN */
function openSite(){
  document.getElementById("env").classList.add("open");

  setTimeout(()=>{
    document.getElementById("overlay").style.opacity="0";
  },1100);

  setTimeout(()=>{
    document.getElementById("overlay").style.display="none";
    document.getElementById("main").classList.add("show");
    startCountdown();
    startParticles();
  },1700);
}

/* COUNTDOWN */
function startCountdown(){
  const t=new Date("2026-08-18T20:00:00");

  setInterval(()=>{
    const n=new Date();
    const d=t-n;

    document.getElementById("d").innerText=Math.floor(d/86400000);
    document.getElementById("h").innerText=Math.floor(d%86400000/3600000);
    document.getElementById("m").innerText=Math.floor(d%3600000/60000);
    document.getElementById("s").innerText=Math.floor(d%60000/1000);
  },1000);
}

/* FLOWERS */
const c=document.getElementById("canvas");
const x=c.getContext("2d");

let w,h;
function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

const emojis=["🌸","🌷","🌺","🌿"];
const p=[];

for(let i=0;i<55;i++){
  p.push({
    x:Math.random()*w,
    y:Math.random()*-h,
    vx:Math.random()*1-0.5,
    vy:Math.random()*1.2+0.5,
    s:Math.random()*20+10,
    r:Math.random()*360,
    vr:Math.random()*2-1,
    e:emojis[Math.floor(Math.random()*emojis.length)]
  });
}

function draw(){
  x.clearRect(0,0,w,h);

  for(let o of p){
    o.x+=o.vx;
    o.y+=o.vy;
    o.r+=o.vr;

    x.save();
    x.translate(o.x,o.y);
    x.rotate(o.r*Math.PI/180);
    x.font=`${o.s}px serif`;
    x.fillText(o.e,0,0);
    x.restore();

    if(o.y>h+50){
      o.y=-20;
      o.x=Math.random()*w;
    }
  }

  requestAnimationFrame(draw);
}

function startParticles(){
  draw();
}
</script>

</body>
</html>
