<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yasemin & Özcan | Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Jost:wght@300;400;500;600&display=swap');

:root{
  --rose:#bd687b;
  --bg1:#fff3f6;
  --bg2:#f7f0ea;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Jost',sans-serif;
  background: radial-gradient(circle at top,#fff3f6,#f7f0ea,#fdfaf6);
  overflow-x:hidden;
  perspective:1200px;
}

/* glow background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,182,193,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,220,180,0.25), transparent 40%);
  z-index:0;
  pointer-events:none;
}

/* FLOWERS CANVAS */
#flower-canvas{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
}

/* ENVELOPE */
#envelope{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f5d4dd,#d8ebf7,#eae2cd);
  z-index:9999;
  cursor:pointer;
  transition:opacity 1s ease;
}

.env-card{
  padding:30px 40px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.15);
}

.env-card h1{
  font-family:'Great Vibes',cursive;
  color:var(--rose);
}

/* MAIN */
#main{
  opacity:0;
  transition:1.2s ease;
  position:relative;
  z-index:5;
}

#main.show{opacity:1;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transform-style:preserve-3d;
}

.hero h1{
  font-family:'Great Vibes',cursive;
  font-size:90px;
  color:var(--rose);
  text-shadow:0 20px 60px rgba(189,104,123,0.25);
}

/* SECTION BASE */
section{
  padding:120px 20px;
  text-align:center;
  transform-style:preserve-3d;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.box{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  min-width:90px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* 3D DEPTH */
.depth{
  will-change:transform;
}

/* TITLE */
.title{
  font-size:50px;
  font-family:'Great Vibes',cursive;
  color:var(--rose);
}

/* CANVAS FIX */
canvas{display:block;}
</style>
</head>

<body>

<canvas id="flower-canvas"></canvas>

<!-- ENVELOPE -->
<div id="envelope" onclick="openSite()">
  <div class="env-card">
    <h1>Yasemin & Özcan</h1>
    <p>Düğün Davetiyesi</p>
    <small>dokun ve aç</small>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <section class="hero depth">
    <h1>Yasemin & Özcan</h1>
    <p>18 Ağustos 2026 • 20:00</p>

    <div class="countdown depth">
      <div class="box"><div id="d">--</div>Gün</div>
      <div class="box"><div id="h">--</div>Saat</div>
      <div class="box"><div id="m">--</div>Dakika</div>
      <div class="box"><div id="s">--</div>Saniye</div>
    </div>
  </section>

  <section class="depth">
    <div class="title">Love Story Begins</div>
    <p>Birlikte yazılan en güzel hikaye…</p>
  </section>

  <section class="depth">
    <div class="title">Location</div>
    <p>Gloria Wedding Hall • Hatay</p>
  </section>

</div>

<script>

/* OPEN */
function openSite(){
  document.getElementById("envelope").style.opacity="0";
  setTimeout(()=>{
    document.getElementById("envelope").style.display="none";
    document.getElementById("main").classList.add("show");
    startCountdown();
  },1000);
}

/* COUNTDOWN */
function startCountdown(){
  const t=new Date("2026-08-18T20:00:00");

  setInterval(()=>{
    const n=new Date();
    const d=t-n;

    document.getElementById("d").innerText=Math.floor(d/86400000);
    document.getElementById("h").innerText=Math.floor(d%86400000/3600000);
    document.getElementById("m").innerText=Math.floor(d%3600000/60000);
    document.getElementById("s").innerText=Math.floor(d%60000/1000);
  },1000);
}

/* 3D SCROLL */
const layers=document.querySelectorAll(".depth");

window.addEventListener("scroll",()=>{
  let y=window.scrollY;

  layers.forEach((el,i)=>{
    let speed=(i+1)*0.2;

    el.style.transform=`
      translateY(${y*speed}px)
      rotateX(${-y*0.02*speed}deg)
      scale(${1 - y*0.0003*speed})
    `;
  });
});

/* FLOWERS CANVAS */
const c=document.getElementById("flower-canvas");
const x=c.getContext("2d");

let w,h;
function r(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}
r();window.addEventListener("resize",r);

const e=["🌸","🌷","🌺","🌿"];
const p=[];

for(let i=0;i<70;i++){
  p.push(make());
}

function make(){
  return{
    x:Math.random()*w,
    y:Math.random()*-h,
    s:Math.random()*22+10,
    vy:Math.random()*1.5+0.5,
    vx:Math.random()*1-0.5,
    r:Math.random()*360,
    vr:Math.random()*2-1,
    e:e[Math.floor(Math.random()*e.length)]
  };
}

function anim(){
  x.clearRect(0,0,w,h);

  for(let o of p){
    o.y+=o.vy;
    o.x+=o.vx;
    o.r+=o.vr;

    x.save();
    x.translate(o.x,o.y);
    x.rotate(o.r*Math.PI/180);
    x.font=`${o.s}px serif`;
    x.fillText(o.e,0,0);
    x.restore();

    if(o.y>h+50){
      Object.assign(o,make(),{y:-50});
    }
  }

  requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
