<html lang="tr">
<head>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

<style>
  :root {
    --blush: #e2a8b5;
    --blush-light: #fbe0e6;
    --sky: #9cc2d8;
    --sky-light: #d0e7f4;
    --sage: #b2c6aa;
    --cream: #faf5ed;
    --petal: #f7cbd6;
    --dusty-rose: #bd687b;
    --lavender: #bba9d3;
    --gold: #b39255;
    --text-dark: #2c1a22;
    --text-mid: #4d3341;
    --text-light: #735464;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* ─── ENVELOPE OVERLAY ─── */
  #envelope-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f5d4dd 0%, #d8ebf7 50%, #eae2cd 100%);
    cursor: pointer;
  }

  .env-scene {
    position: relative;
    width: min(420px, 90vw);
    height: min(300px, 65vw);
    filter: drop-shadow(0 20px 60px rgba(150,90,110,0.4));
  }

  /* Envelope body */
  .env-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #ffeef2 0%, #fadce7 100%);
    border-radius: 4px 4px 12px 12px;
    border: 1.5px solid rgba(180,110,130,0.4);
    overflow: hidden;
  }

  .env-body::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(170deg, #fbe2eb 0%, #f4cbdb 100%);
    clip-path: polygon(0 30%, 50% 0%, 100% 30%, 100% 100%, 0 100%);
  }

  /* Left flap */
  .env-flap-left {
    position: absolute;
    bottom: 0; left: 0;
    width: 50%; height: 58%;
    background: linear-gradient(135deg, #fadce7, #ebaed1);
    clip-path: polygon(0 0, 100% 30%, 100% 100%, 0 100%);
    border-right: 1px solid rgba(180,110,130,0.3);
  }

  /* Right flap */
  .env-flap-right {
    position: absolute;
    bottom: 0; right: 0;
    width: 50%; height: 58%;
    background: linear-gradient(225deg, #fadce7, #ebaed1);
    clip-path: polygon(100% 0, 0 30%, 0 100%, 100% 100%);
  }

  /* Top flap */
  .env-flap-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(170deg, #fbcfe0, #f2a4bf);
    clip-path: polygon(0 0, 50% 75%, 100% 0);
    transform-origin: top center;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 3;
  }

  .env-flap-top.open {
    transform: rotateX(180deg);
  }

  /* Wax seal */
  .env-seal {
    position: absolute;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    z-index: 4;
    transition: opacity 0.3s, transform 0.3s;
  }

  .env-seal.hidden {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.5);
  }

  .seal-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #de829f, #a24b69);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(130,50,75,0.5), inset 0 1px 3px rgba(255,255,255,0.4);
    font-family: 'Great Vibes', cursive;
    color: white;
    font-size: 26px;
    letter-spacing: 0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* Card inside envelope */
  .env-card {
    position: absolute;
    bottom: 8%;
    left: 10%; right: 10%;
    height: 80%;
    background: white;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 2;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 20px rgba(150,90,110,0.2);
    overflow: hidden;
  }

  .env-card.rise {
    transform: translateY(-120%);
  }

  .env-card-inner {
    text-align: center;
    padding: 16px;
  }

  .env-card-inner p {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(22px, 5vw, 32px);
    color: var(--dusty-rose);
    line-height: 1.3;
    font-weight: 600;
  }

  .env-card-inner span {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-mid);
    display: block;
    margin-top: 6px;
  }

  /* Envelope decoration lines */
  .env-deco {
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(180,110,130,0.3);
    border-radius: 4px;
    pointer-events: none;
  }

  /* Click hint */
  .env-hint {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dark);
    white-space: nowrap;
    animation: pulse-hint 2s ease-in-out infinite;
  }

  @keyframes pulse-hint {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) translateY(0); }
    50% { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  }

  .env-flowers-left, .env-flowers-right {
    position: absolute;
    top: -30px;
    pointer-events: none;
  }
  .env-flowers-left { left: -40px; }
  .env-flowers-right { right: -40px; transform: scaleX(-1); }

  /* ─── FLOATING PARTICLES ─── */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    font-size: 18px;
    animation: float-particle linear infinite;
    opacity: 0;
  }

  @keyframes float-particle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-50px) rotate(360deg) translateX(80px); opacity: 0; }
  }

  /* ─── BIRDS ─── */
  .bird-container {
    position: fixed;
    pointer-events: none;
    z-index: 2;
  }

  .bird {
    position: absolute;
    font-size: 22px;
    animation: fly-bird 12s linear infinite;
    opacity: 0;
  }

  @keyframes fly-bird {
    0% { transform: translateX(-120px) translateY(0) scaleX(1); opacity: 0; }
    5% { opacity: 0.8; }
    45% { transform: translateX(50vw) translateY(-30px) scaleX(1); }
    50% { transform: translateX(50vw) translateY(-30px) scaleX(-1); }
    95% { opacity: 0.8; }
    100% { transform: translateX(-120px) translateY(0) scaleX(-1); opacity: 0; }
  }

  /* ─── MAIN CONTENT ─── */
  #main-content {
    opacity: 0;
    transition: opacity 0.8s ease;
    position: relative;
    z-index: 10;
  }

  #main-content.visible { opacity: 1; }

  /* ─── HERO ─── */
  .hero {

    justify-content: center;

  .hero-corner { position: absolute; pointer-events: none; }
  .hero-corner.tl { top: 20px; left: 20px; }
  .hero-corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .hero-corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .hero-corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

  .hero-divider {

    margin: 20px auto;
  }

  .hero-label {
    font-family: 'Jost', sans-serif;
    font-weight: 400;

    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-dark);

  .hero-names {

  .hero-amp {

  .hero-date-box {

  }

  .hero-date {

  .hero-time {

  .hero-flower-row {

  .scroll-hint {

    bottom: 30px;

    flex-direction: column;

  .scroll-hint span {

  }

  .scroll-arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--dusty-rose), transparent);
    animation: scroll-drop 2s ease-in-out infinite;
  }

  @keyframes scroll-drop {
    0%, 100% { transform: scaleY(0); transform-origin: top; opacity: 0; }
    30% { transform: scaleY(1); transform-origin: top; opacity: 1; }
    70% { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
    100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
  }

  /* ─── SECTION BASE ─── */
  section {
    padding: 80px 20px;
    max-width: 860px;
    margin: 0 auto;
  }

  .section-tag {
    font-family: 'Jost', sans-serif;

    font-size: 12px;

  .section-title {

  }

  .ornament {
    display: flex;
    align-items: center;

    gap: 12px;

  .ornament-line {

  .ornament-dot {

  }

  /* ─── COUNTDOWN ─── */
  .countdown-section {
    background: linear-gradient(135deg, #fadce2 0%, #daedf8 100%);
    padding: 60px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .countdown-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e2a8b5' fill-opacity='0.25'%3E%3Cpath d='M30 30c0-11 9-20 20-20v40c-11 0-20-9-20-20zm0 0c0 11-9 20-20 20V10c11 0 20 9 20 20z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }

  .countdown-grid {
    display: flex;
    justify-content: center;
    gap: clamp(12px, 3vw, 32px);
    flex-wrap: wrap;
    margin-top: 32px;
  }

  .count-item {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);

    box-shadow: 0 8px 32px rgba(180,90,110,0.15);
  }

  .count-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 8vw, 56px);

    color: var(--dusty-rose);

  }

  .count-label {

  }

  /* ─── LOVE STORY / POEM ─── */
  .poem-section {
    text-align: center;
    padding: 80px 20px;

  }

  .poem-card {

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
// ─── ENVELOPE OPEN ───
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;

  const flap = document.getElementById('env-flap-top');
  const seal = document.getElementById('env-seal');
  const card = document.getElementById('env-card');
  const overlay = document.getElementById('envelope-overlay');
  const main = document.getElementById('main-content');

  // Seal disappears
  seal.classList.add('hidden');

  // Flap opens
  setTimeout(() => {
    flap.classList.add('open');
  }, 300);

  // Card rises
  setTimeout(() => {
    card.classList.add('rise');
  }, 900);

  // Overlay fades out
  setTimeout(() => {
    gsap.to(overlay, { opacity: 0, duration: 0.8, ease: 'power2.inOut', onComplete: () => {
      overlay.style.display = 'none';
    }});
    main.classList.add('visible');
    AOS.init({ duration: 900, once: true, easing: 'ease-out-cubic', offset: 60 });
    startCountdown();
    createParticles();
    createBirds();
  }, 1700);
}

// ─── COUNTDOWN ───
function startCountdown() {
  const target = new Date('2026-08-18T20:00:00');
  function update() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('days').textContent = '🎊';
      document.getElementById('hours').textContent = '🎊';
      document.getElementById('minutes').textContent = '🎊';
      document.getElementById('seconds').textContent = '🎊';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent = String(d).padStart(2,'0');
    document.getElementById('hours').textContent = String(h).padStart(2,'0');
    document.getElementById('minutes').textContent = String(m).padStart(2,'0');
    document.getElementById('seconds').textContent = String(s).padStart(2,'0');
  }
  update();
  setInterval(update, 1000);
}

// ─── PARTICLES ───
function createParticles() {
  const container = document.getElementById('particles');
  const emojis = ['🌸','🌷','🌼','🌺','💐','🌿','✿','❀','🌹','🍃'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (14 + Math.random() * 16) + 'px';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    el.style.opacity = 0;
    container.appendChild(el);
  }
}

// ─── BIRDS ───
function createBirds() {
  const container = document.getElementById('birds');
  const birdEmojis = ['🕊️','🕊️','🦋'];
  const rows = [15, 35, 60];
  rows.forEach((top, i) => {
    const bird = document.createElement('div');
    bird.className = 'bird';
    bird.textContent = birdEmojis[i % birdEmojis.length];
    bird.style.top = top + 'vh';
    bird.style.fontSize = (18 + Math.random() * 10) + 'px';
    bird.style.animationDuration = (10 + Math.random() * 8) + 's';
    bird.style.animationDelay = (i * 3 + Math.random() * 4) + 's';
    container.appendChild(bird);
  });
}

// ─── SMOOTH SCROLL ───
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(a.getAttribute('href'));
    if (target) target.scrollIntoView({ behavior: 'smooth' });
  });
});
