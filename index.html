<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasemin & Özcan Davetiye</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lenis@1.0.45/dist/lenis.css" />

    <style>
        :root {
            --bg-pink: #FFF0F5;
            --bg-blue: #E6F2F8;
            --primary-pink: #F4C2C2;
            --primary-blue: #A9C9E2;
            --text-dark: #4A4A4A;
            --gold: #D4AF37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--bg-pink) 0%, var(--bg-blue) 100%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .script-font {
            font-family: 'Alex Brush', cursive;
        }

        /* Smooth Scroll (Lenis) Ayarı */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto !important;
        }

        /* --- SAKLAMA / GÖSTERME SINIFLARI --- */
        #main-content {
            display: none; /* Zarf açılana kadar ana içerik gizli */
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* --- 1. EKRAN: PRE-LOADER & ZARF SAHNESİ --- */
        .envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            perspective: 1000px;
        }

        .envelope-container {
            position: relative;
            width: 360px;
            height: 260px;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 4px;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        /* Zarfın Arkası ve Yan Kanatları Görsel İllüzyonu */
        .envelope-container::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 130px solid #f9f9f9;
            z-index: 3;
        }
        .envelope-container::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 0;
            border-top: 130px solid transparent;
            border-bottom: 130px solid transparent;
            border-left: 180px solid #f1f1f1;
            z-index: 2;
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0; width: 0; height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-top: 130px solid #e0e0e0;
            transform-origin: top center;
            z-index: 4;
        }

        .seal {
            position: absolute;
            top: 110px;
            left: 155px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Alex Brush', cursive;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        .envelope-container:hover .seal {
            transform: scale(1.1);
        }

        .envelope-text {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            color: #757575;
            animation: pulse 1.5s infinite;
        }

        /* Zarf İçi Kart */
        .letter-card {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 330px;
            height: 240px;
            background: linear-gradient(to bottom, #fff, var(--bg-pink));
            z-index: 1;
            padding: 20px;
            text-align: center;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .letter-card h2 {
            font-size: 32px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        /* --- LOTTIE AMBİYANS ALANLARI --- */
        .lottie-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- ANA İÇERİK TASARIMI --- */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .hero-names {
            font-size: 75px;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .hero-tagline {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #777;
        }

        /* --- GERİ SAYIM (COUNTDOWN) --- */
        .countdown-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .countdown-item {
            text-align: center;
        }

        .countdown-number {
            font-size: 32px;
            font-weight: 300;
            color: var(--text-dark);
            display: block;
        }

        .countdown-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        /* --- FOTOĞRAF GALERİSİ (PREMIUM SWIPER) --- */
        .gallery-section {
            padding: 100px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .swiper {
            width: 100%;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 300px;
            height: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 8px solid #fff;
            overflow: hidden;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- DETAYLAR VE LOKASYON --- */
        .details-section {
            padding: 80px 20px;
            text-align: center;
            background: rgba(255,255,255,0.4);
            margin: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .details-title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .info-text {
            font-size: 18px;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .gold-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 20px auto;
        }

        /* --- ANIMASYONLAR --- */
        @keyframes pulse {
            0% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(-5px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0.6; }
        }

        /* Mobil Optimizasyon */
        @media (max-width: 480px) {
            .hero-names { font-size: 55px; }
            .countdown-container { padding: 15px 25px; gap: 15px; }
            .countdown-number { font-size: 24px; }
            .swiper-slide { width: 260px; height: 360px; }
            .envelope-container { transform: scale(0.85); }
        }
    </style>
</head>
<body>

    <div class="lottie-bg" id="lottie-ambience"></div>

    <div class="envelope-wrapper" id="envelope-screen">
        <div class="envelope-container" id="envelope">
            <div class="envelope-flap" id="flap"></div>
            <div class="letter-card" id="card">
                <h2 class="script-font">Düğünümüze Davetlisiniz</h2>
                <p style="font-size: 12px; letter-spacing: 2px; color: var(--gold);">YASEMİN & ÖZCAN</p>
            </div>
            <div class="seal" id="seal">YÖ</div>
        </div>
        <div class="envelope-text">Açmak İçin Mühre Dokunun</div>
    </div>

    <div id="main-content">
        
        <section class="hero-section">
            <div data-aos="zoom-in" data-aos-duration="1200">
                <h1 class="hero-names script-font">Yasemin & Özcan</h1>
                <p class="hero-tagline">Evleniyoruz</p>
            </div>

            <div class="countdown-container" data-aos="fade-up" data-aos-delay="300">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">Gün</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Saat</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Dakika</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">Saniye</span>
                </div>
            </div>
        </section>

        <section class="gallery-section" data-aos="fade-up">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <img src="foto1.jpeg" alt="Yasemin & Özcan 1">
                    </div>
                    <div class="swiper-slide">
                        <img src="foto2.jpeg" alt="Yasemin & Özcan 2">
                    </div>
                    <div class="swiper-slide">
                        <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600" alt="Bahar Teması">
                    </div>
                </div>
            </div>
        </section>

        <section class="details-section" data-aos="fade-up">
            <h2 class="details-title script-font">Sonsuz Mutluluğa Doğru</h2>
            <div class="gold-line"></div>
            <p class="info-text" style="font-weight: 500;">18 Ağustos Pazartesi</p>
            <p class="info-text" style="font-size: 16px; color: #666;">Saat: 20:00</p>
            <div class="gold-line"></div>
            <p class="info-text" style="font-size: 15px; font-style: italic;">"Bu güzel günümüzde yanımızda olmanızdan mutluluk duyarız."</p>
            <p class="info-text" style="font-size: 13px; color: #888; margin-top: 30px; letter-spacing: 2px;">LOKASYON BİLGİSİ YAKINDA PAYLAŞILACAKTIR</p>
        </section>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.0.45/dist/lenis.min.js"></script>

    <script>
        // 1. SMOOTH SCROLL (Lenis) ENTEGRASYONU
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. LOTTIE BAHAR VE KUŞ ANİMASYONLARI
        // LottieFiles'dan aldığımız şık bir uçan kuşlar / dökülen çiçek animasyonu linki
        lottie.loadAnimation({
            container: document.getElementById('lottie-ambience'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: 'https://assets2.lottiefiles.com/packages/lf20_m9b86scw.json' // Romantik bahar / yaprak dökümü efekti
        });

        // 3. GSAP İLE ETKİLEŞİMLİ ZARF AÇILMA ANİMASYONU
        const envelope = document.getElementById('envelope');
        const seal = document.getElementById('seal');
        const flap = document.getElementById('flap');
        const card = document.getElementById('card');
        const envelopeScreen = document.getElementById('envelope-screen');
        const mainContent = document.getElementById('main-content');

        envelope.addEventListener('click', () => {
            let tl = gsap.timeline();

            // Mührü kır/kaybet
            tl.to(seal, { duration: 0.3, opacity: 0, scale: 0 });
            
            // Zarf kapağını yukarı doğru aç (3D Dönüş)
            tl.to(flap, { duration: 0.6, rotateX: 180, ease: "power1.inOut" }, "-=0.1");
            
            // Kartı zarfın içinden yukarı doğru kaydır
            tl.to(card, { duration: 0.8, y: -120, zIndex: 10, ease: "power2.out" });
            
            // Tüm zarf ekranını soft bir şekilde yok et ve ana içeriği getir
            tl.to(envelopeScreen, { 
                duration: 0.8, 
                opacity: 0, 
                y: -50,
                onComplete: () => {
                    envelopeScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    setTimeout(() => {
                        mainContent.style.opacity = 1;
                        // AOS ve Swiper'ı tetikle
                        AOS.init({ duration: 1000, once: true });
                        initSwiper();
                    }, 50);
                }
            }, "+=0.3");
        });

        // 4. PREMIUM SWIPER (Coverflow Efekti)
        function initSwiper() {
            new Swiper(".mySwiper", {
                effect: "coverflow",
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: "auto",
                coverflowEffect: {
                    rotate: 20,
                    stretch: 0,
                    depth: 100,
                    modifier: 1,
                    slideShadows: false,
                },
                loop: true,
                autoplay: {
                    delay: 3000,
                    disableOnInteraction: false,
                }
            });
        }

        // 5. GERİ SAYIM (COUNTDOWN) SİSTEMİ
        const weddingDate = new Date("Aug 18, 2026 20:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown-container").innerHTML = "<p style='padding:10px;'>O Büyük Gün Geldi!</p>";
            }
        }, 1000);
    </script>
</body>
</html>
