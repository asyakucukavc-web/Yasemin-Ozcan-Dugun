<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yasemin & Özcan | Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f3ee;
  --ink:#1b1b1b;
  --rose:#c48b9f;
  --gold:#c8a96a;
  .invite-title{
  font-family: "Playfair Display", serif;
  font-size: 14px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.6);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeInUp 1s ease forwards 0.4s;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  overflow-x:hidden;
  font-family:Inter;
}

/* ---------------- FLOWERS ---------------- */
#petals{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.petal{
  position:absolute;
  font-size:18px;
  opacity:.8;
  animation:fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh) rotate(0)}
  to{transform:translateY(110vh) rotate(360deg)}
}

/* ---------------- ENVELOPE ---------------- */
#envelope{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#f3d6df,#e8e1d6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  transition:.8s ease;
}

.env-box{
  width:320px;height:220px;
  position:relative;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:1s;
}

.env-front{
  position:absolute;
  inset:0;
  background:white;
  border-radius:8px;
  box-shadow:0 30px 80px rgba(0,0,0,.2);
}

.env-flap{
  position:absolute;
  width:100%;height:100%;
  background:linear-gradient(135deg,#f2cbd7,#e6b7c7);
  clip-path:polygon(0 0,50% 60%,100% 0);
  transform-origin:top;
  transition:1s;
}

.env-box.open .env-flap{
  transform:rotateX(180deg);
}

.env-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:"Great Vibes";
  font-size:28px;
  color:var(--rose);
}

/* ---------------- MAIN ---------------- */
main{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
  position:relative;
  z-index:2;
}

main.show{
  opacity:1;
  transform:translateY(0);
}

/* ---------------- HERO ---------------- */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  perspective:1200px;
}

.hero h1{
  <div class="invite-title">Düğünümüze Davetlisiniz!</div>
  font-family:"Great Vibes";
  font-size:90px;
  color:var(--ink);
  transform:translateZ(60px);
    margin-top:10px;
}

.hero p{
  margin-top:10px;
  letter-spacing:4px;
  font-weight:300;
}

/* ---------------- 3D SCROLL ---------------- */
.scroll{
  padding:120px 20px;
  text-align:center;
  transform:translateZ(0);
}

.card{
  max-width:500px;
  margin:40px auto;
  padding:40px;
  background:white;
  border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,.08);
  transform:translateY(60px);
  opacity:0;
  transition:1s;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

/* ---------------- COUNTDOWN ---------------- */
.countdown{
  text-align:center;
  padding:100px 20px;
}

.time{
  display:flex;
  justify-content:center;
  gap:20px;
}

.box{
  padding:20px;
  background:white;
  border-radius:12px;
  min-width:90px;
}

/* ---------------- MAP ---------------- */
.map{
  text-align:center;
  padding:100px 20px;
}

.btn{
  display:inline-block;
  padding:15px 30px;
  background:var(--ink);
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* ---------------- OPEN ---------------- */
#envelope.hide{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="petals"></div>

<div id="envelope" onclick="openEnv()">
  <div class="env-box" id="box">
    <div class="env-flap"></div>
    <div class="env-front"></div>
    <div class="env-text">
      Yasemin & Özcan<br>
      <small style="font-family:Inter;font-size:12px;letter-spacing:3px">INVITATION</small>
    </div>
  </div>
</div>

<main id="main">

<section class="hero">
  <h1>Yasemin & Özcan</h1>
  <p>WEDDING INVITATION</p>
</section>

<section class="scroll">
  <div class="card">📅 18 Ağustos 2026</div>
  <div class="card">🕗 20:00</div>
  <div class="card">📍 Gloria Wedding Hall</div>
</section>

<section class="countdown">
  <h2>Geri Sayım</h2>
  <div class="time">
    <div class="box" id="d">00</div>
    <div class="box" id="h">00</div>
    <div class="box" id="m">00</div>
    <div class="box" id="s">00</div>
  </div>
</section>

<section class="map">
  <a class="btn" href="https://maps.google.com">Haritada Aç</a>
</section>

</main>

<script>

/* ENVELOPE */
function openEnv(){
  document.getElementById("box").classList.add("open");

  setTimeout(()=>{
    document.getElementById("envelope").classList.add("hide");
    document.getElementById("main").classList.add("show");
  },900);
}

/* PETALS */
const petalBox = document.getElementById("petals");
const emojis = ["🌸","🌷","🌺"];

for(let i=0;i<40;i++){
  const s=document.createElement("div");
  s.className="petal";
  s.innerHTML=emojis[Math.floor(Math.random()*3)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(5+Math.random()*5)+"s";
  s.style.fontSize=(14+Math.random()*18)+"px";
  petalBox.appendChild(s);
}

/* 3D SCROLL */
const cards=document.querySelectorAll(".card");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting)x.target.classList.add("show");
  })
},{threshold:.2});
cards.forEach(c=>io.observe(c));

/* COUNTDOWN */
const target=new Date("2026-08-18T20:00:00");

setInterval(()=>{
  const d=target-new Date();
  document.getElementById("d").innerText=Math.floor(d/86400000);
  document.getElementById("h").innerText=Math.floor(d%86400000/3600000);
  document.getElementById("m").innerText=Math.floor(d%3600000/60000);
  document.getElementById("s").innerText=Math.floor(d%60000/1000);
},1000);

</script>

</body>
</html>
